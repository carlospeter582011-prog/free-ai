<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations Multi-Tool Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #121214; color: #e1e1e6; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: #1d1d22; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; color: #00df89; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #29292e; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #a8a8b3; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .tab-btn.active { background: #00df89; color: #121214; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        label { display: block; margin: 12px 0 6px; font-weight: 600; color: #a8a8b3; }
        input, select, textarea { width: 100%; padding: 12px; background: #29292e; border: 1px solid #38383d; border-radius: 6px; color: #fff; font-size: 15px; margin-bottom: 10px; resize: vertical; }
        input:focus, select:focus, textarea:focus { border-color: #00df89; outline: none; }
        button.submit-btn { background: #00df89; color: #121214; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        button.submit-btn:hover { background: #00b36c; }

        .chat-box { background: #121214; border: 1px solid #29292e; height: 350px; overflow-y: auto; padding: 15px; border-radius: 6px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.4; word-break: break-word; }
        .msg.user { background: #29292e; align-self: flex-end; color: #fff; }
        .msg.ai { background: #004d34; align-self: flex-start; color: #e1e1e6; border-left: 3px solid #00df89; }

        .output-area { margin-top: 20px; text-align: center; background: #121214; padding: 15px; border-radius: 6px; min-height: 50px; display: flex; justify-content: center; align-items: center; }
        img.result-img { max-width: 100%; border-radius: 6px; border: 1px solid #29292e; max-height: 450px; }
        audio { width: 100%; margin-top: 10px; }
        .loading { color: #00df89; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pollinations Dashboard</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('text-tab')">💬 Chat (With Memory)</button>
        <button class="tab-btn" onclick="switchTab('image-tab')">🖼️ Image Gen</button>
        <button class="tab-btn" onclick="switchTab('audio-tab')">🔊 Audio (TTS)</button>
    </div>

    <div id="text-tab" class="tab-content active">
        <label for="text-model">Choose Text Model:</label>
        <select id="text-model">
            <option value="openai">GPT-4o-mini (Free Default)</option>
            <option value="qwen-coder">Qwen 2.5 Coder</option>
            <option value="mistral">Mistral Nemo</option>
        </select>
        
        <div class="chat-box" id="chat-box">
            <div class="msg ai">Hello! I'm an AI assistant with persistent conversational memory. How can I help you today?</div>
        </div>
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="Type your message here..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button onclick="sendChatMessage()" style="background:#00df89; border:none; padding:0 20px; border-radius:6px; cursor:pointer; color:#121214; font-weight:bold;">Send</button>
        </div>
        <button onclick="clearChat()" style="background:transparent; color:#ea4335; border:1px solid #ea4335; margin-top:10px; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:12px;">Clear Memory</button>
    </div>

    <div id="image-tab" class="tab-content">
        <label for="image-model">Choose Image Model:</label>
        <select id="image-model">
            <option value="flux">Flux (Fast & High Quality)</option>
            <option value="turbo">Z-Image Turbo</option>
        </select>

        <label for="image-prompt">Describe your image:</label>
        <textarea id="image-prompt" rows="3" placeholder="e.g., A cinematic shot of a futuristic neon city..."></textarea>
        
        <button class="submit-btn" onclick="generateImage()">Generate Image</button>
        
        <div class="output-area" id="image-output">Your generated image will appear here...</div>
    </div>

    <div id="audio-tab" class="tab-content">
        <label for="audio-prompt">Text to turn into speech:</label>
        <textarea id="audio-prompt" rows="3" placeholder="Type the text you want the AI to read aloud..."></textarea>
        
        <button class="submit-btn" onclick="generateAudio()">Generate Voice</button>
        
        <div class="output-area" id="audio-output">Your audio player will appear here...</div>
    </div>
</div>

<script>
    // Your verified client publishable key for tracking
    const APP_KEY = "pk_SsIOXdjaysZkXkoi";

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    let conversationHistory = [];

    // --- TEXT CORE LOGIC ---
    async function sendChatMessage() {
        const inputField = document.getElementById('chat-input');
        const userText = inputField.value.trim();
        if (!userText) return;

        const model = document.getElementById('text-model').value;
        const chatBox = document.getElementById('chat-box');

        appendMessage(userText, 'user');
        inputField.value = '';

        conversationHistory.push({ role: 'user', content: userText });

        const loadingDiv = appendMessage('AI is thinking...', 'ai loading-msg');
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Using OpenAI-compatible endpoint with Authorization Header tracking
            const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${APP_KEY}`
                },
                body: JSON.stringify({
                    messages: conversationHistory,
                    model: model,
                    stream: false
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;
            
            loadingDiv.remove();
            appendMessage(aiText, 'ai');
            
            conversationHistory.push({ role: 'assistant', content: aiText });
            
        } catch (error) {
            loadingDiv.innerText = "Error fetching response. Try again.";
            console.error(error);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        return msgDiv;
    }

    function clearChat() {
        conversationHistory = [];
        document.getElementById('chat-box').innerHTML = `<div class="msg ai">Memory cleared!</div>`;
    }

    // --- IMAGE CORE LOGIC ---
    async function generateImage() {
        const prompt = document.getElementById('image-prompt').value.trim();
        const model = document.getElementById('image-model').value;
        const outputDiv = document.getElementById('image-output');

        if (!prompt) return alert('Type a prompt first!');

        outputDiv.innerHTML = '<span class="loading">Painting image via API...</span>';

        try {
            // Standardizing request through the auth tracking layer
            const response = await fetch('https://gen.pollinations.ai/v1/images/generations', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${APP_KEY}`
                },
                body: JSON.stringify({
                    prompt: prompt,
                    model: model,
                    width: 512,
                    height: 512
                })
            });

            const data = await response.json();
            const imageUrl = data.data[0].url;

            const img = new Image();
            img.src = imageUrl;
            img.className = 'result-img';
            img.onload = () => {
                outputDiv.innerHTML = '';
                outputDiv.appendChild(img);
            };
        } catch (error) {
            outputDiv.innerHTML = 'Failed to generate image.';
            console.error(error);
        }
    }

    // --- AUDIO CORE LOGIC ---
    function generateAudio() {
        const prompt = document.getElementById('audio-prompt').value.trim();
        const outputDiv = document.getElementById('audio-output');

        if (!prompt) return alert('Type text for audio generation!');

        outputDiv.innerHTML = '<span class="loading">Synthesizing voice...</span>';

        // Using parameterized GET with the App Key query variable
        const encodedText = encodeURIComponent(prompt);
        const audioUrl = `https://gen.pollinations.ai/text/tts?text=${encodedText}&key=${APP_KEY}`;

        outputDiv.innerHTML = `
            <div style="width: 100%;">
                <p style="margin-bottom: 5px; color:#00df89; font-size:14px;">Audio File Ready:</p>
                <audio controls src="${audioUrl}"></audio>
            </div>
        `;
    }
</script>
</body>
</html>
