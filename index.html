<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pollinations Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #0d0e12; color: #e1e1e6; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 600px; background: #16171d; padding: 16px; border-radius: 16px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        /* Top Header & Auth Bar */
        .header { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #292a33; padding-bottom: 12px; }
        .brand { font-size: 20px; font-weight: 800; color: #00df89; text-align: center; }
        
        .auth-panel { background: #1f2029; padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; }
        .btn-auth { background: #00df89; color: #0d0e12; border: none; padding: 10px 16px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; width: 100%; justify-content: center; }
        .btn-logout { background: transparent; border: 1px solid #ea4335; color: #ea4335; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 5px; }
        .badge { background: #292a33; padding: 2px 8px; border-radius: 12px; font-size: 12px; color: #00df89; font-weight: 600; }

        /* Mobile Segmented Tabs */
        .tabs { display: flex; background: #1f2029; padding: 4px; border-radius: 10px; gap: 4px; }
        .tab-btn { flex: 1; background: none; border: none; color: #a8a8b3; padding: 12px 4px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; text-align: center; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { background: #2e303d; color: #00df89; }
        
        .tab-content { display: none; background: #1a1b24; padding: 14px; border-radius: 12px; border: 1px solid #23242e; }
        .tab-content.active { display: block; }

        /* Interactive Inputs */
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #a8a8b3; }
        input, select, textarea { width: 100%; padding: 12px; background: #1f2029; border: 1px solid #2e303d; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 12px; -webkit-appearance: none; }
        input:focus, select:focus, textarea:focus { border-color: #00df89; outline: none; }
        
        .action-btn { background: #00df89; color: #0d0e12; border: none; padding: 14px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; }
        .action-btn:active { transform: scale(0.98); }

        /* Responsive Conversational Interface */
        .chat-box { background: #0d0e12; border: 1px solid #23242e; height: 280px; overflow-y: auto; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .msg { max-width: 85%; padding: 10px 12px; border-radius: 10px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg.user { background: #1f2029; align-self: flex-end; color: #fff; border-bottom-right-radius: 2px; }
        .msg.ai { background: #0b2e21; align-self: flex-start; color: #e1e1e6; border-left: 3px solid #00df89; border-bottom-left-radius: 2px; }

        /* Media display constraints */
        .output-area { margin-top: 14px; text-align: center; background: #0d0e12; padding: 12px; border-radius: 8px; min-height: 60px; display: flex; justify-content: center; align-items: center; }
        img.result-img { max-width: 100%; height: auto; border-radius: 6px; max-height: 320px; object-fit: contain; }
        audio { width: 100%; }
        .loading { color: #00df89; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand">Pollinations Hub</div>
        
        <div class="auth-panel" id="auth-panel">
            <span id="auth-status">Using App Key Mode (0.01 Pollen limit)</span>
            <button class="btn-auth" onclick="loginWithPollinations()">🏵️ Connect Pollinations Account</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this, 'text-tab')">💬 Chat</button>
        <button class="tab-btn" onclick="switchTab(this, 'image-tab')">🖼️ Image</button>
        <button class="tab-btn" onclick="switchTab(this, 'audio-tab')">🔊 Audio</button>
    </div>

    <div id="text-tab" class="tab-content active">
        <label for="text-model">Choose Model:</label>
        <select id="text-model">
            <option value="openai">GPT-4o-mini (Free Tier Friendly)</option>
            <option value="qwen-coder">Qwen 2.5 Coder</option>
            <option value="mistral">Mistral Nemo</option>
        </select>
        
        <div class="chat-box" id="chat-box">
            <div class="msg ai">Welcome! Connect your account above or text with the assistant right now. Memory is turned on.</div>
        </div>
        
        <div style="display:flex; gap:8px;">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button onclick="sendChatMessage()" style="background:#00df89; border:none; width:65px; height:46px; border-radius:8px; cursor:pointer; color:#0d0e12; font-weight:bold; font-size:14px;">Send</button>
        </div>
    </div>

    <div id="image-tab" class="tab-content">
        <label for="image-model">Model Style:</label>
        <select id="image-model">
            <option value="flux">Flux (Fast & Beautiful)</option>
            <option value="turbo">Z-Image Turbo</option>
        </select>
        <label for="image-prompt">Describe Image:</label>
        <textarea id="image-prompt" rows="2" placeholder="Ex: Cyberpunk city streets in neon green..."></textarea>
        <button class="action-btn" onclick="generateImage()">Generate Picture</button>
        <div class="output-area" id="image-output">Your image will generate here...</div>
    </div>

    <div id="audio-tab" class="tab-content">
        <label for="audio-prompt">Text-to-Speech Engine:</label>
        <textarea id="audio-prompt" rows="2" placeholder="Type what the voice assistant should read out loud..."></textarea>
        <button class="action-btn" onclick="generateAudio()">Speak Text</button>
        <div class="output-area" id="audio-output">Audio rendering wave...</div>
    </div>
</div>

<script>
    // App Tracking Variable Configuration
    const APP_KEY = "pk_SsIOXdjaysZkXkoi"; 
    let USER_TOKEN = localStorage.getItem('pollinations_user_token') || "";

    window.addEventListener('DOMContentLoaded', () => {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const incomingToken = hashParams.get('api_key');
        
        if (incomingToken) {
            USER_TOKEN = incomingToken;
            localStorage.setItem('pollinations_user_token', incomingToken);
            window.history.replaceState(null, null, window.location.pathname);
        }
        updateAuthInterface();
    });

    // REFIXED OAUTH ROUTE: Budget constraints removed entirely for 0.01 Spore Tier limits
    function loginWithPollinations() {
        const currentDomain = window.location.origin + window.location.pathname;
        const authUrl = `https://enter.pollinations.ai/authorize?redirect_uri=${encodeURIComponent(currentDomain)}&client_id=${APP_KEY}`;
        window.location.href = authUrl;
    }

    function logout() {
        USER_TOKEN = "";
        localStorage.removeItem('pollinations_user_token');
        updateAuthInterface();
    }

    function updateAuthInterface() {
        const panel = document.getElementById('auth-panel');
        if (USER_TOKEN) {
            const displayToken = USER_TOKEN.substring(0, 8) + "...";
            panel.innerHTML = `
                <div>Account Linked: <span class="badge">${displayToken}</span></div>
                <button class="btn-logout" onclick="logout()">Disconnect Wallet</button>
            `;
        } else {
            panel.innerHTML = `
                <span style="font-size:12px; color:#a8a8b3; margin-bottom:6px; display:block;">Sign in to call via your personal wallet threshold</span>
                <button class="btn-auth" onclick="loginWithPollinations()">🏵️ Connect Pollinations Account</button>
            `;
        }
    }

    function getAuthToken() {
        return USER_TOKEN ? USER_TOKEN : APP_KEY;
    }

    function switchTab(element, tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    let conversationHistory = [];

    // --- TEXT COMPLETIONS CHAT LINK ---
    async function sendChatMessage() {
        const inputField = document.getElementById('chat-input');
        const userText = inputField.value.trim();
        if (!userText) return;

        const model = document.getElementById('text-model').value;
        const chatBox = document.getElementById('chat-box');

        appendMessage(userText, 'user');
        inputField.value = '';
        conversationHistory.push({ role: 'user', content: userText });

        const loadingDiv = appendMessage('Thinking...', 'ai loading-msg');
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getAuthToken()}`
                },
                body: JSON.stringify({
                    messages: conversationHistory,
                    model: model,
                    stream: false
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;
            
            loadingDiv.remove();
            appendMessage(aiText, 'ai');
            conversationHistory.push({ role: 'assistant', content: aiText });
            
        } catch (error) {
            loadingDiv.innerText = "Error. Free limit or network cap hit.";
            console.error(error);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        return msgDiv;
    }

    // --- REVERTED IMAGE COMMUNICATION OVER PUBLIC ENDPOINTS ---
    function generateImage() {
        const prompt = document.getElementById('image-prompt').value.trim();
        const model = document.getElementById('image-model').value;
        const outputDiv = document.getElementById('image-output');

        if (!prompt) return alert('Enter description prompt!');
        outputDiv.innerHTML = '<span class="loading">Processing image array...</span>';

        const encodedPrompt = encodeURIComponent(prompt);
        // Direct media pipeline tracking via key variable param
        const imageUrl = `https://image.pollinations.ai/p/${encodedPrompt}?model=${model}&width=512&height=512&nologo=true&key=${getAuthToken()}`;

        const img = new Image();
        img.src = imageUrl;
        img.className = 'result-img';
        img.onload = () => {
            outputDiv.innerHTML = '';
            outputDiv.appendChild(img);
        };
        img.onerror = () => {
            outputDiv.innerHTML = 'Rendering failure over current model node.';
        };
    }

    // --- AUDIO TEXT TO SPEECH ---
    function generateAudio() {
        const prompt = document.getElementById('audio-prompt').value.trim();
        const outputDiv = document.getElementById('audio-output');

        if (!prompt) return alert('Enter vocal prompt string!');
        outputDiv.innerHTML = '<span class="loading">Compiling audio stream...</span>';

        const encodedText = encodeURIComponent(prompt);
        const audioUrl = `https://text.pollinations.ai/tts?text=${encodedText}&key=${getAuthToken()}`;

        outputDiv.innerHTML = `
            <div style="width: 100%;">
                <audio controls src="${audioUrl}"></audio>
            </div>
        `;
    }
</script>
</body>
</html>
